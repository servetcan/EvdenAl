                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">

                    <li class="nav-item">

                <ul class="navbar-nav">

    <div class="container my-5">
        <h2>Siparişlerim</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Sipariş No</th>
                    <th>Tarih</th>
                    <th>Toplam</th>
                    <th>Durum</th>
                </tr>
            </thead>
            <tbody id="ordersTable">
                <!-- Siparişler JS ile yüklenecek -->
            </tbody>
        </table>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 E-Ticaret Sitesi. Tüm hakları saklıdır.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simüle edilmiş siparişler
        const orders = [
            { id: 1001, date: '2026-01-01', total: 150, status: 'Hazırlanıyor' },
            { id: 1002, date: '2026-01-02', total: 300, status: 'Kargoda' },
            { id: 1003, date: '2026-01-03', total: 200, status: 'Teslim Edildi' }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>${order.id}</td>
                    <td>${order.date}</td>
                    <td>${order.total} TL</td>
                    <td>${order.status}</td>
                </tr>
            `).join('');
        });
    </script>
