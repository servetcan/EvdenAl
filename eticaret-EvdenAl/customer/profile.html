    <div class="container my-5">

                        <form id="profileForm">
                            <div class="mb-3">
                                <label for="firstName" class="form-label">Ad</label>

                            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            // KullanÄącÄą bilgilerini doldur
            document.getElementById('firstName').value = user.firstName || '';
            document.getElementById('lastName').value = user.lastName || '';
            document.getElementById('email').value = user.email || '';

            const form = document.getElementById('profileForm');
            const errorMessages = document.getElementById('errorMessages');

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                errorMessages.innerHTML = '';

                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();

                let errors = [];

                if (!firstName) errors.push('Ad alanÄą boÅ bÄąrakÄąlamaz.');
                if (!lastName) errors.push('Soyad alanÄą boÅ bÄąrakÄąlamaz.');
                if (!email) errors.push('E-posta alanÄą boÅ bÄąrakÄąlamaz.');

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (email && !emailRegex.test(email)) {
                    errors.push('GeÃ§erli bir e-posta adresi giriniz.');
                }

                if (phone && !/^\d{10,11}$/.test(phone.replace(/\s/g, ''))) {
                    errors.push('GeÃ§erli bir telefon numarasÄą giriniz.');
                }

                if (errors.length > 0) {
                    errorMessages.innerHTML = errors.map(error => `<p>${error}</p>`).join('');
                } else {
                    // Profil gÃžncelle
                    user.firstName = firstName;
                    user.lastName = lastName;
                    user.email = email;
                    user.phone = phone;
                    localStorage.setItem('currentUser', JSON.stringify(user));

                    // KullanÄącÄą listesinde de gÃžncelle
                    const users = JSON.parse(localStorage.getItem('users')) || [];
                    const index = users.findIndex(u => u.email === user.email);
                    if (index !== -1) {
                        users[index] = user;
                        localStorage.setItem('users', JSON.stringify(users));
                    }

                    alert('Profil gÃžncellendi!');
                }
            });
        });

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        }
    </script>
