    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><img src="../assets/images/EvdenAl.png" alt="EvdenAl"> EvdenAl</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../product-list.html">Ürünler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../cart.html">Sepet</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            Hesabım
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="dashboard.html">Dashboard</a></li>
                            <li><a class="dropdown-item" href="orders.html">Siparişlerim</a></li>

                            <li><a class="dropdown-item active" href="address.html">Adres</a></li>
                            <li><hr class="dropdown-divider"></li>

                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">Adres Bilgileri</h3>
                    </div>
                    <div class="card-body">
                        <form id="addressForm">
                            <div class="mb-3">
                                <label for="addressTitle" class="form-label">Adres Başlığı</label>
                                <input type="text" class="form-control" id="addressTitle" value="Ev Adresi" required>
                            </div>
                            <div class="mb-3">
                                <label for="fullAddress" class="form-label">Tam Adres</label>
                                <textarea class="form-control" id="fullAddress" rows="3" required>İstanbul, Türkiye</textarea>
                            </div>
                            <div class="mb-3">
                                <label for="city" class="form-label">Şehir</label>
                                <input type="text" class="form-control" id="city" value="İstanbul" required>
                            </div>
                            <div class="mb-3">
                                <label for="postalCode" class="form-label">Posta Kodu</label>
                                <input type="text" class="form-control" id="postalCode" value="34000">
                            </div>
                            <div id="errorMessages" class="text-danger mb-3"></div>
                            <button type="submit" class="btn btn-primary w-100">Güncelle</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 E-Ticaret Sitesi. Tüm hakları saklıdır.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('addressForm');
            const errorMessages = document.getElementById('errorMessages');

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                errorMessages.innerHTML = '';

                const addressTitle = document.getElementById('addressTitle').value.trim();
                const fullAddress = document.getElementById('fullAddress').value.trim();
                const city = document.getElementById('city').value.trim();
                const postalCode = document.getElementById('postalCode').value.trim();

                let errors = [];

                if (!addressTitle) errors.push('Adres başlığı boş bırakılamaz.');
                if (!fullAddress) errors.push('Tam adres boş bırakılamaz.');
                if (!city) errors.push('Şehir boş bırakılamaz.');

                if (postalCode && !/^\d{5}$/.test(postalCode)) {
                    errors.push('Geçerli bir posta kodu giriniz (5 hane).');
                }

                if (errors.length > 0) {
                    errorMessages.innerHTML = errors.map(error => `<p>${error}</p>`).join('');
                } else {
                    alert('Adres güncellendi!');
                }
            });
        });
    </script>
</body>
</html>
