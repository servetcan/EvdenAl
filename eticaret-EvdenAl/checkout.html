<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ödeme - E-Ticaret Sitesi</title>
    <link rel="icon" type="image/png" href="assets/images/EvdenAl.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="assets/images/EvdenAl.png" alt="EvdenAl"> EvdenAl</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Ana Sayfa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="product-list.html">Ürünler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">Sepet</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Giriş Yap</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Kayıt Ol</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center mb-4">Ödeme</h2>
        <div class="row">
            <div class="col-md-8">
                <form id="checkoutForm">
                    <h4>Adres Bilgileri</h4>
                    <div class="mb-3">
                        <label for="firstName" class="form-label">Ad</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label">Soyad</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">Adres</label>
                        <textarea class="form-control" id="address" rows="3" required></textarea>
                    </div>
                    <h4>Kart Bilgileri</h4>
                    <div class="mb-3">
                        <label for="cardNumber" class="form-label">Kart Numarası</label>
                        <input type="text" class="form-control" id="cardNumber" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="expiryDate" class="form-label">Son Kullanma Tarihi (MM/YY)</label>
                            <input type="text" class="form-control" id="expiryDate" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cvv" class="form-label">CVV</label>
                            <input type="text" class="form-control" id="cvv" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="captcha" class="form-label">CAPTCHA: <span id="captchaText"></span></label>
                        <input type="text" class="form-control" id="captchaInput" required>
                    </div>
                    <div id="errorMessages" class="text-danger mb-3"></div>
                    <button type="submit" class="btn btn-primary">Ödemeyi Tamamla</button>
                </form>
            </div>
            <div class="col-md-4">
                <h4>Sepet Özeti</h4>
                <div id="cartSummary">
                    <!-- Sepet özeti -->
                </div>
                <h5>Toplam: <span id="totalPrice">0</span> TL</h5>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 E-Ticaret Sitesi. Tüm hakları saklıdır.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/captcha.js"></script>
    <script src="js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCartSummary();
        });

        function loadCartSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const container = document.getElementById('cartSummary');
            let total = 0;
            container.innerHTML = cart.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `<p>${item.name} x ${item.quantity} = ${itemTotal} TL</p>`;
            }).join('');
            document.getElementById('totalPrice').textContent = total;
        }
    </script>
</body>
</html>
