<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Ekle - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">Admin Paneli</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Ürünler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="add-product.html">Ürün Ekle</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">Kategoriler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">Siparişler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">Kullanıcılar</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Çıkış</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">Ürün Ekle</h3>
                    </div>
                    <div class="card-body">
                        <form id="addProductForm">
                            <div class="mb-3">
                                <label for="productName" class="form-label">Ürün Adı</label>
                                <input type="text" class="form-control" id="productName" required>
                            </div>
                            <div class="mb-3">
                                <label for="category" class="form-label">Kategori</label>
                                <select class="form-select" id="category" required>
                                    <option value="">Seçiniz</option>
                                    <option value="bebek">Bebek Mağazası</option>
                                    <option value="mobilya">Mobilya</option>
                                    <option value="oyun">PC ve PlayStation Oyunları</option>
                                    <option value="kozmetik">Kozmetik Ürünler</option>
                                    <option value="petshop">Petshop Ürünleri</option>
                                    <option value="telefon">Cep Telefonu ve Aksesuarları</option>
                                    <option value="bilgisayar">Bilgisayar ve Aksesuarları</option>
                                    <option value="ayakkabi">Ayakkabı</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="price" class="form-label">Fiyat</label>
                                <input type="number" class="form-control" id="price" min="0" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="form-label">Açıklama</label>
                                <textarea class="form-control" id="description" rows="3" required></textarea>
                            </div>
                            <div id="errorMessages" class="text-danger mb-3"></div>
                            <button type="submit" class="btn btn-primary w-100">Ürün Ekle</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 E-Ticaret Sitesi. Tüm hakları saklıdır.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
