<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Giriş - E-Ticaret Sitesi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">Admin Giriş</h3>
                    </div>
                    <div class="card-body">
                        <form id="adminLoginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Kullanıcı Adı</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Şifre</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="captcha" class="form-label">CAPTCHA: <span id="captchaText"></span></label>
                                <input type="text" class="form-control" id="captchaInput" required>
                            </div>
                            <div id="errorMessages" class="text-danger mb-3"></div>
                            <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="../index.html">Ana Sayfaya Dön</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/captcha.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('adminLoginForm');
            const errorMessages = document.getElementById('errorMessages');

            form.addEventListener('submit', function(event) {
                event.preventDefault();
                errorMessages.innerHTML = '';

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const captchaInput = document.getElementById('captchaInput').value.trim();

                let errors = [];

                if (!username) errors.push('Kullanıcı adı boş bırakılamaz.');
                if (!password) errors.push('Şifre boş bırakılamaz.');
                if (!captchaInput) errors.push('CAPTCHA alanı boş bırakılamaz.');

                // Simüle admin kontrolü
                if (username !== 'adminservet@gmail.com' || password !== 'admin732') {
                    errors.push('Geçersiz kullanıcı adı veya şifre.');
                }

                if (captchaInput && !verifyCaptcha(captchaInput)) {
                    errors.push('CAPTCHA yanlış girildi.');
                }

                if (errors.length > 0) {
                    errorMessages.innerHTML = errors.map(error => `<p>${error}</p>`).join('');
                } else {
                    alert('Admin giriş başarılı!');
                    window.location.href = 'dashboard.html';
                }
            });
        });
    </script>
</body>
</html>
